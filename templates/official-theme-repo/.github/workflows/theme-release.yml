name: Theme Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v3.4.0
        required: true
      slug:
        description: Theme slug, for example arcus
        required: true
      label:
        description: Theme label, for example Arcus
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      THEME_TAG_INPUT: ${{ inputs.tag }}
      THEME_SLUG_INPUT: ${{ inputs.slug }}
      THEME_LABEL_INPUT: ${{ inputs.label }}
    steps:
      - name: Checkout theme
        uses: actions/checkout@v4

      - name: Checkout Press checks
        uses: actions/checkout@v4
        with:
          repository: EkilyHQ/Press
          path: .press

      - name: Validate inputs
        id: release_inputs
        run: |
          set -euo pipefail
          tag="${THEME_TAG_INPUT}"
          slug="${THEME_SLUG_INPUT}"
          label="${THEME_LABEL_INPUT}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag must be vMAJOR.MINOR.PATCH" >&2
            exit 2
          fi
          if [[ ! "${slug}" =~ ^[a-z0-9][a-z0-9_-]{0,63}$ ]]; then
            echo "slug must match [a-z0-9][a-z0-9_-]*" >&2
            exit 2
          fi
          if [[ -z "${label}" || "${label}" == *$'\n'* || "${label}" == *$'\r'* ]]; then
            echo "label must be a non-empty single line" >&2
            exit 2
          fi
          {
            echo "tag=${tag}"
            echo "slug=${slug}"
            echo "label=${label}"
            echo "version=${tag#v}"
          } >> "${GITHUB_OUTPUT}"

      - name: Prepare release version
        env:
          RELEASE_VERSION: ${{ steps.release_inputs.outputs.version }}
        run: |
          set -euo pipefail
          version="${RELEASE_VERSION}"
          export VERSION="${version}"
          node <<'NODE'
          const fs = require('fs');
          const path = 'theme/theme.json';
          const version = process.env.VERSION;
          const manifest = JSON.parse(fs.readFileSync(path, 'utf8'));
          manifest.version = version;
          fs.writeFileSync(path, `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

      - name: Validate theme contract
        env:
          THEME_SLUG: ${{ steps.release_inputs.outputs.slug }}
        run: |
          set -euo pipefail
          slug="${THEME_SLUG}"
          rm -rf ".press/assets/themes/${slug}"
          mkdir -p ".press/assets/themes/${slug}"
          rsync -a ./theme/ ".press/assets/themes/${slug}/"
          cd .press
          node --experimental-default-type=module scripts/test-theme-contracts.js

      - name: Package theme
        id: package
        env:
          THEME_TAG: ${{ steps.release_inputs.outputs.tag }}
          THEME_SLUG: ${{ steps.release_inputs.outputs.slug }}
          RELEASE_VERSION: ${{ steps.release_inputs.outputs.version }}
        run: |
          set -euo pipefail
          tag="${THEME_TAG}"
          slug="${THEME_SLUG}"
          version="${RELEASE_VERSION}"
          asset="press-theme-${slug}-${tag}.zip"
          mkdir -p dist "press-theme-${slug}"
          rsync -a ./theme/ "press-theme-${slug}/"
          theme_version="$(node -p 'require("./theme/theme.json").version || ""')"
          if [[ "${theme_version}" != "${version}" ]]; then
            echo "theme/theme.json version ${theme_version:-'(missing)'} does not match ${version}" >&2
            exit 2
          fi
          find "press-theme-${slug}" -type f | sort | sed "s#^press-theme-${slug}/##" > dist/files.txt
          zip -qr "dist/${asset}" "press-theme-${slug}"
          size="$(wc -c < "dist/${asset}" | tr -d ' ')"
          digest="$(sha256sum "dist/${asset}" | awk '{print $1}')"
          {
            echo "version=${version}"
            echo "asset=${asset}"
            echo "size=${size}"
            echo "digest=${digest}"
          } >> "${GITHUB_OUTPUT}"

      - name: Publish fetchable artifact
        id: artifact
        env:
          THEME_TAG: ${{ steps.release_inputs.outputs.tag }}
          PACKAGE_ASSET: ${{ steps.package.outputs.asset }}
        run: |
          set -euo pipefail
          tag="${THEME_TAG}"
          asset="${PACKAGE_ASSET}"
          artifact_branch="release-artifacts"
          artifact_path="${tag}/${asset}"
          artifact_url="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${artifact_branch}/${artifact_path}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "${artifact_branch}" || true
          rm -rf artifacts-worktree
          if git show-ref --verify --quiet "refs/remotes/origin/${artifact_branch}"; then
            git worktree add artifacts-worktree "origin/${artifact_branch}"
          else
            git worktree add --detach artifacts-worktree
            git -C artifacts-worktree checkout --orphan "${artifact_branch}"
            git -C artifacts-worktree rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p "artifacts-worktree/${tag}"
          cp "dist/${asset}" "artifacts-worktree/${artifact_path}"
          git -C artifacts-worktree add "${artifact_path}"
          if git -C artifacts-worktree diff --cached --quiet; then
            echo "Artifact ${artifact_path} is already published."
          else
            git -C artifacts-worktree commit -m "Publish ${asset}"
            git -C artifacts-worktree push origin "HEAD:${artifact_branch}"
          fi
          git worktree remove artifacts-worktree --force
          echo "url=${artifact_url}" >> "${GITHUB_OUTPUT}"

      - name: Update theme-release.json
        env:
          THEME_TAG: ${{ steps.release_inputs.outputs.tag }}
          THEME_SLUG: ${{ steps.release_inputs.outputs.slug }}
          THEME_LABEL: ${{ steps.release_inputs.outputs.label }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
          PACKAGE_ASSET: ${{ steps.package.outputs.asset }}
          PACKAGE_SIZE: ${{ steps.package.outputs.size }}
          PACKAGE_DIGEST: ${{ steps.package.outputs.digest }}
          ARTIFACT_URL: ${{ steps.artifact.outputs.url }}
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY}"
          tag="${THEME_TAG}"
          slug="${THEME_SLUG}"
          label="${THEME_LABEL}"
          version="${PACKAGE_VERSION}"
          asset="${PACKAGE_ASSET}"
          asset_url="${ARTIFACT_URL}"
          size="${PACKAGE_SIZE}"
          digest="${PACKAGE_DIGEST}"
          published_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          export repo tag slug label version asset asset_url size digest published_at
          node <<'NODE'
          const fs = require('fs');
          const repo = process.env.repo;
          const tag = process.env.tag;
          const slug = process.env.slug;
          const label = process.env.label;
          const version = process.env.version;
          const asset = process.env.asset;
          const assetUrl = process.env.asset_url;
          const size = Number(process.env.size || 0);
          const digest = process.env.digest;
          const publishedAt = process.env.published_at;
          const files = fs.readFileSync('dist/files.txt', 'utf8').split(/\r?\n/).filter(Boolean);
          const manifest = {
            schemaVersion: 1,
            type: 'press-theme',
            value: slug,
            label,
            version,
            contractVersion: 1,
            release: {
              tag,
              htmlUrl: `https://github.com/${repo}/releases/tag/${tag}`,
              publishedAt,
              notes: ''
            },
            asset: {
              name: asset,
              url: assetUrl,
              size,
              digest: `sha256:${digest}`
            },
            files
          };
          fs.writeFileSync('theme-release.json', `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

      - name: Commit manifest
        id: commit
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add theme/theme.json theme-release.json
          if git diff --cached --quiet; then
            echo "No release metadata changes to commit."
          else
            git commit -m "Update theme release manifest"
            git push
          fi
          echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          THEME_TAG: ${{ steps.release_inputs.outputs.tag }}
          PACKAGE_ASSET: ${{ steps.package.outputs.asset }}
          RELEASE_TARGET: ${{ steps.commit.outputs.sha }}
        run: |
          set -euo pipefail
          tag="${THEME_TAG}"
          asset="dist/${PACKAGE_ASSET}"
          target="${RELEASE_TARGET}"
          gh release view "${tag}" >/dev/null 2>&1 && gh release delete "${tag}" --yes --cleanup-tag
          gh release create "${tag}" "${asset}" --target "${target}" --title "${tag}" --notes "Theme release ${tag}"
