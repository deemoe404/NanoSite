# yaml-language-server: $schema=./assets/schema/site.json

siteTitle:
  default: NanoSite
  en: NanoSite
  ja: "ナノサイト"
  zh: "微站"
  zh-tw: "微站"
  zh-hk: "微站"

siteSubtitle:
  default: "Just Markdown. Just a website."
  en: "Just Markdown. Just a website."
  ja: "書くだけ、Markdown。それがサイトになる。"
  zh: "写下 Markdown，就是你的网站。"
  zh-tw: "寫下 Markdown，就是你的網站。"
  zh-hk: "寫低 Markdown，就係你嘅網站。"

siteDescription:
  default: "NanoSite - Just Markdown. Just a website."
  en: "NanoSite - Just Markdown. Just a website."
  ja: "ナノサイト - 書くだけ、Markdown。それがサイトになる。"
  zh: "微站 - 写下 Markdown，就是你的网站。"
  zh-tw: "微站 - 寫下 Markdown，就是你的網站。"
  zh-hk: "微站 - 寫低 Markdown，就係你嘅網站。"

siteKeywords:
  default: "static blog, markdown, github pages, blog"
  en: "static blog, markdown, github pages, blog"
  ja: "静的サイト, Markdown, GitHub Pages, ブログ"
  zh: "静态博客, Markdown, GitHub Pages, 博客"
  zh-tw: "靜態部落格, Markdown, GitHub Pages, 部落格"
  zh-hk: "靜態網誌, Markdown, GitHub Pages, 網誌"

siteURL: https://nano.dee.moe/

avatar: assets/avatar.jpeg

profileLinks:
  - label: Official site
    href: https://nano.dee.moe/
  - label: GitHub
    href: https://github.com/deemoe404/NanoSite

contentRoot: wwwroot

contentOutdatedDays: 180

cardCoverFallback: false

errorOverlay: true

cachePolicy:
  content: default
  editorContent: no-store

pageSize: 8

defaultLanguage: en

themeMode: user

themePack: native

themeOverride: false

showAllPosts: true

landingTab: About

repo:
  owner: deemoe404
  name: NanoSite
  branch: main

assetWarnings:
  largeImage:
    enabled: true
    thresholdKB: 500
